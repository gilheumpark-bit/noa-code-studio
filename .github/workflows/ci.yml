name: CI

on:
  push:
    branches: [master, main, 'feat/**', 'fix/**']
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Lint + Typecheck + Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Theme contrast (WCAG AA)
        run: node tools/scripts/contrast-check.mjs

      - name: Null byte scan (renderer + packages)
        shell: bash
        run: |
          BAD=$(find apps packages -type f \( -name '*.ts' -o -name '*.tsx' \) -print0 \
                | xargs -0 grep -Pl '\x00' 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "❌ Null bytes detected in:"
            echo "$BAD"
            exit 1
          fi
          echo "✅ No null bytes found"

      - name: Typecheck (turbo)
        run: pnpm turbo run typecheck

      - name: Lint (turbo)
        run: pnpm turbo run lint

      - name: Test + Coverage (turbo)
        run: pnpm run test:coverage
        env:
          CI: true

      - name: Upload coverage (if generated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: |
            apps/desktop/coverage/
            packages/*/coverage/
          if-no-files-found: ignore
          retention-days: 14
