name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only, do not publish'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  release:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Contrast lint (theme tokens AA)
        run: node tools/scripts/contrast-check.mjs

      - name: Typecheck monorepo
        run: pnpm turbo run typecheck

      - name: Build packages
        run: pnpm turbo run build --filter=@eh/quill-engine --filter=@eh/quill-cli --filter=@eh/shared-types

      - name: Build desktop renderer
        run: pnpm --filter @eh/desktop run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Package Electron (${{ matrix.os }})
        working-directory: apps/desktop
        run: pnpm exec electron-builder --publish ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS notarization (only used when notarize:true in builder yml)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing (optional)
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload artifacts (dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            dist/desktop/*.dmg
            dist/desktop/*.zip
            dist/desktop/*.exe
            dist/desktop/*.AppImage
            dist/desktop/*.deb
            dist/desktop/*.rpm
          if-no-files-found: ignore
          retention-days: 14
