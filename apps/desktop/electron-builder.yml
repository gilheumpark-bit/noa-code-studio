# apps/desktop/electron-builder.yml
#
# 3-OS packaging configuration for NOA Code Studio.

appId: com.noa.codestudio
productName: NOA Code Studio
copyright: Copyright © 2026 gilheumpark-bit
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

# ============================================================
# Build outputs
# ============================================================

directories:
  output: ../../dist/desktop
  buildResources: build

# ============================================================
# Files included in the asar
# ============================================================

asar: true
asarUnpack:
  - "**/node-pty/**"     # native binary, must stay outside asar
  - "**/quill-cli/**"    # CLI binary needs filesystem access

files:
  - app/**
  - package.json
  - "!**/*.{md,log,test.ts,test.tsx,spec.ts,spec.tsx}"
  - "!**/__tests__/**"
  - "!**/coverage/**"

# Bundle the standalone CLI binary alongside the app
extraResources:
  - from: ../../packages/quill-cli/dist
    to: bin
    filter: ["**/*"]

# ============================================================
# Per-platform targets
# ============================================================

mac:
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: build/icon.icns
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: portable
      arch: [x64]
    - target: zip
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NOA Code Studio
  uninstallDisplayName: NOA Code Studio

linux:
  category: Development
  desktop:
    entry:
      Name: NOA Code Studio
      Comment: AI-Powered Desktop IDE
      Categories: Development;IDE;
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
    - target: rpm
      arch: [x64]
  icon: build/icon.png

# ============================================================
# Auto-update (electron-updater)
# ============================================================

publish:
  provider: github
  owner: gilheumpark-bit
  repo: noa-code-studio
  releaseType: release

# ============================================================
# Build hooks
# ============================================================

forceCodeSigning: false
removePackageScripts: true
buildDependenciesFromSource: false
nodeGypRebuild: false
npmRebuild: false
